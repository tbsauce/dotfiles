# Catppuccin Macchiato for Yazi

[manager]
cwd = { fg = "#8bd5ca" }

hovered = { fg = "#24273a", bg = "#8aadf4" }
preview_hovered = { underline = true }

find_keyword = { fg = "#eed49f", bold = true, italic = true, underline = true }
find_position = { fg = "#f5a97f", bg = "reset", italic = true }

marker_selected = { fg = "#a6da95", bg = "#a6da95" }
marker_copied = { fg = "#eed49f", bg = "#eed49f" }
marker_cut = { fg = "#ed8796", bg = "#ed8796" }

tab_active = { fg = "#24273a", bg = "#8aadf4" }
tab_inactive = { fg = "#cad3f5", bg = "#363a4f" }
tab_width = 1

border_symbol = "│"
border_style = { fg = "#494d64" }

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#363a4f", bg = "#363a4f" }

mode_normal = { fg = "#24273a", bg = "#8aadf4", bold = true }
mode_select = { fg = "#24273a", bg = "#a6da95", bold = true }
mode_unset = { fg = "#24273a", bg = "#c6a0f6", bold = true }

progress_label = { fg = "#cad3f5", bold = true }
progress_normal = { fg = "#8aadf4", bg = "#363a4f" }
progress_error = { fg = "#ed8796", bg = "#363a4f" }

permissions_t = { fg = "#8aadf4" }
permissions_r = { fg = "#eed49f" }
permissions_w = { fg = "#ed8796" }
permissions_x = { fg = "#a6da95" }
permissions_s = { fg = "#6e738d" }

[input]
border = { fg = "#8aadf4" }
title = {}
value = {}
selected = { reversed = true }

[select]
border = { fg = "#8aadf4" }
active = { fg = "#c6a0f6" }
inactive = {}

[tasks]
border = { fg = "#8aadf4" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#363a4f" }
cand = { fg = "#8bd5ca" }
rest = { fg = "#6e738d" }
desc = { fg = "#c6a0f6" }
separator = "  "
separator_style = { fg = "#494d64" }

[help]
on = { fg = "#c6a0f6" }
run = { fg = "#8bd5ca" }
desc = { fg = "#6e738d" }
hovered = { bg = "#363a4f", bold = true }
footer = { fg = "#cad3f5", bg = "#24273a" }

[filetype]
rules = [
    { mime = "image/*", fg = "#8bd5ca" },
    { mime = "video/*", fg = "#eed49f" },
    { mime = "audio/*", fg = "#eed49f" },
    { mime = "application/zip", fg = "#c6a0f6" },
    { mime = "application/gzip", fg = "#c6a0f6" },
    { mime = "application/x-tar", fg = "#c6a0f6" },
    { mime = "application/x-bzip2", fg = "#c6a0f6" },
    { mime = "application/x-7z-compressed", fg = "#c6a0f6" },
    { mime = "application/x-rar", fg = "#c6a0f6" },
    { name = "*.md", fg = "#eed49f" },
    { name = "*.rs", fg = "#f5a97f" },
    { name = "*.py", fg = "#a6da95" },
    { name = "*.js", fg = "#eed49f" },
    { name = "*.ts", fg = "#8aadf4" },
    { name = "*.lua", fg = "#8aadf4" },
    { name = "*.toml", fg = "#f5a97f" },
    { name = "*.json", fg = "#eed49f" },
    { name = "*.yml", fg = "#ed8796" },
    { name = "*.yaml", fg = "#ed8796" },
    { name = "*", fg = "#cad3f5" },
    { name = "*/", fg = "#8aadf4" },
]
