# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",kitty:RGB"

# Mouse support
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Increase scrollback
set -g history-limit 10000

# Reduce escape delay
set -sg escape-time 10

# Focus events
set -g focus-events on

# Vim keys in copy mode
setw -g mode-keys vi

# ── Catppuccin Macchiato Theme ──
set -g status-position top
set -g status-style "bg=#24273a,fg=#cad3f5"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[bg=#8aadf4,fg=#24273a,bold]  #S #[bg=#24273a,fg=#8aadf4] "
set -g status-right "#[fg=#494d64]│ #[fg=#b8c0e0]%a %b %d #[fg=#494d64]│ #[fg=#8aadf4]%H:%M "

# Window status
setw -g window-status-format "#[fg=#6e738d] #I:#W "
setw -g window-status-current-format "#[bg=#363a4f,fg=#8aadf4,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#8aadf4"

# Message style
set -g message-style "bg=#363a4f,fg=#cad3f5"
set -g message-command-style "bg=#363a4f,fg=#cad3f5"

# Mode style (visual selection etc)
setw -g mode-style "bg=#494d64,fg=#cad3f5"

# Clock
setw -g clock-mode-colour "#8aadf4"
