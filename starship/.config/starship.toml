# Starship prompt — Catppuccin Macchiato

palette = "catppuccin_macchiato"

format = """
$line_break\
[╭─ ](overlay0)\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold lavender"
format = "[$path](bold lavender) "
truncation_length = 0

[git_branch]
symbol = ""
style = "bold mauve"
format = "[on](overlay1) [$symbol $branch](bold mauve)"

[git_status]
style = "bold yellow"
format = " [$all_status$ahead_behind](bold yellow)"

[cmd_duration]
min_time = 2_000
style = "bold peach"
format = " [󰔟 $duration](bold peach)"

[character]
success_symbol = "[╰─ ❯](overlay0)"
error_symbol = "[╰─ ❯](red)"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
