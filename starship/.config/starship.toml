# Starship prompt — Catppuccin Macchiato

palette = "catppuccin_macchiato"

format = """
[](blue)\
$os\
$username\
[](bg:lavender fg:blue)\
$directory\
[](fg:lavender bg:green)\
$git_branch\
$git_status\
[](fg:green bg:yellow)\
$cmd_duration\
[](fg:yellow)\
$fill\
$line_break\
$character"""

[os]
disabled = false
style = "bg:blue fg:crust"

[os.symbols]
Fedora = " "

[username]
show_always = false
style_user = "bg:blue fg:crust"
format = "[$user ]($style)"

[directory]
style = "bg:lavender fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bg:green fg:crust"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:green fg:crust"
format = "[$all_status$ahead_behind ]($style)"

[cmd_duration]
min_time = 2_000
style = "bg:yellow fg:crust"
format = "[ 󰔟 $duration ]($style)"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[fill]
symbol = " "

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
