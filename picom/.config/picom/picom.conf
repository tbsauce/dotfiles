# Picom config — Catppuccin rice

# ── Shadows ──
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.6;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── Fading ──
fading = true;
fade-in-step = 0.07;
fade-out-step = 0.07;
fade-delta = 6;

# ── Transparency / Opacity ──
inactive-opacity = 0.92;
frame-opacity = 1.0;
inactive-opacity-override = false;
focus-exclude = [
    "class_g = 'i3-frame'"
];
opacity-rule = [
    "100:fullscreen"
];

# ── Corners ──
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'"
];

# ── Blur ──
blur-method = "gaussian";
blur-size = 10;
blur-deviation = 5.0;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ── General ──
backend = "glx";
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
log-level = "warn";

wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.9; focus = true; full-shadow = false; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
