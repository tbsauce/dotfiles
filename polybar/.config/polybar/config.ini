; Polybar config — Catppuccin Macchiato

[colors]
base = #24273a
mantle = #1e2030
crust = #181926
text = #cad3f5
subtext0 = #a5adcb
subtext1 = #b8c0e0
surface0 = #363a4f
surface1 = #494d64
surface2 = #5b6078
overlay0 = #6e738d
blue = #8aadf4
lavender = #b7bdf8
teal = #8bd5ca
green = #a6da95
yellow = #eed49f
peach = #f5a97f
red = #ed8796
mauve = #c6a0f6
pink = #f5bde6
flamingo = #f0c6c6
rosewater = #f4dbd6
sky = #91d7e3

[bar/main]
width = 100%
height = 30pt
radius = 0

background = ${colors.base}
foreground = ${colors.text}

line-size = 3pt

border-bottom-size = 2pt
border-bottom-color = ${colors.surface0}

padding-left = 1
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.surface2}

font-0 = JetBrainsMono Nerd Font:size=10;3
font-1 = JetBrainsMono Nerd Font:size=13;4

modules-left = i3 xwindow
modules-right = pulseaudio backlight memory filesystem battery wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 4
tray-background = ${colors.base}

wm-restack = i3

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true

label-focused = %index%
label-focused-background = ${colors.surface0}
label-focused-foreground = ${colors.blue}
label-focused-underline = ${colors.blue}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.surface2}
label-unfocused-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.subtext0}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.base}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.subtext1}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "  "
format-volume-prefix-foreground = ${colors.blue}
format-volume = <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.text}

format-muted-prefix = "  "
format-muted-prefix-foreground = ${colors.red}
label-muted = muted
label-muted-foreground = ${colors.surface2}

click-right = pavucontrol

[module/backlight]
type = internal/backlight
card = amdgpu_bl1

format-prefix = "  "
format-prefix-foreground = ${colors.yellow}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 5

format-prefix = "  "
format-prefix-foreground = ${colors.mauve}
label = %percentage_used%%

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /

format-mounted-prefix = "  "
format-mounted-prefix-foreground = ${colors.peach}
label-mounted = %percentage_used%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = ACAD
full-at = 98
low-at = 15

format-charging-prefix = " 󰂄 "
format-charging-prefix-foreground = ${colors.green}
format-charging = <label-charging>
label-charging = %percentage%%

format-discharging-prefix = " 󰁿 "
format-discharging-prefix-foreground = ${colors.yellow}
format-discharging = <label-discharging>
label-discharging = %percentage%%

format-full-prefix = " 󰁹 "
format-full-prefix-foreground = ${colors.green}
label-full = full

format-low-prefix = " 󰂃 "
format-low-prefix-foreground = ${colors.red}
label-low = %percentage%%

[module/wlan]
type = internal/network
interface-type = wireless
interval = 5

format-connected-prefix = " 󰤨 "
format-connected-prefix-foreground = ${colors.teal}
label-connected = %essid%

format-disconnected-prefix = " 󰤭 "
format-disconnected-prefix-foreground = ${colors.red}
label-disconnected = off
label-disconnected-foreground = ${colors.surface2}

[module/date]
type = internal/date
interval = 30

date = %a %b %d
time = %H:%M

format-prefix = "  "
format-prefix-foreground = ${colors.blue}
label = %date%  %time%

[settings]
screenchange-reload = true
pseudo-transparency = true
